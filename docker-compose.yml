version: '3'
services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        image: lantern-app
        container_name: lantern_app
        restart: unless-stopped
        tty: true
        environment:
            SERVICE_NAME: app
            SERVICE_TAGS: dev
        working_dir: /var/www
        volumes:
            - ./:/var/www
        networks:
            - lantern_network

    web:
        image: nginx:alpine
        container_name: lantern_web
        restart: unless-stopped
        tty: true
        ports:
            - "8000:80"
        volumes:
            - ./:/var/www
            - ./docker/nginx/conf.d/:/etc/nginx/conf.d/
        networks:
            - lantern_network

    mysql:
        image: mysql:8.0
        container_name: lantern_DB
        restart: always
        environment:
            MYSQL_DATABASE: lantern
            MYSQL_ROOT_PASSWORD: lantern
        ports:
            - "3306:3306"
        volumes:
            - mysql_data:/var/lib/mysql
        networks:
            - lantern_network

networks:
    lantern_network:
        driver: bridge

volumes:
    mysql_data: